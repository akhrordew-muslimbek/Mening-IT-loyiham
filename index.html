<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akhror Web | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #00ff88;
            --bg: #06090f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #101725 0%, #06090f 100%);
        }

        /* Orqa fondagi harakatlanuvchi nur */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.2;
            border-radius: 50%;
            animation: float-bg 8s infinite alternate;
            z-index: -1;
        }

        @keyframes float-bg {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border-radius: 50%;
            margin: 0 auto 20px;
            padding: 4px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .profile-img div {
            background: var(--bg);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .title { color: var(--primary); font-size: 14px; font-weight: 600; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 2px; }

        .btn-list { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 15px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--primary);
            transform: scale(1.03) translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="profile-img">
            <div>👨‍💻</div>
        </div>
        <h1>Akhror Web</h1>
        <p class="title">Frontend Developer</p>

        <div class="btn-list">
            <a href="html-dars.html" class="btn">
                <span>HTML5 Darslari</span>
                <div class="dot"></div>
            </a>
            <a href="css_dars.html" class="btn">
                <span>CSS3 Dizaynlar</span>
                <div class="dot"></div>
            </a>
            <a href="pythondars.html" class="btn">
                <span>Python Algoritmlar</span>
                <div class="dot"></div>
            </a>
        </div>
    </div>

</body>
</html>

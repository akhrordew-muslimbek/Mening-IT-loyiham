<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Muslimbek web | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow: #38bdf8;
            --accent: #2ea043;
            --dark: #0a0c10;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark);
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* Harakatlanuvchi fon */
            background: radial-gradient(circle at center, #111827 0%, #000000 100%);
        }

        /* Fon uchun animatsiya qilingan shar */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--glow);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .card {
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .profile-ring {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 20px;
            padding: 5px;
            background: linear-gradient(to right, var(--glow), var(--accent));
            animation: spin 4s linear infinite;
        }

        .avatar {
            width: 100%;
            height: 100%;
            background: var(--dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        .tagline { color: #8b949e; font-size: 14px; margin-bottom: 30px; }

        .links { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 15px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--glow);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .btn span:last-child { opacity: 0.5; transition: 0.3s; }
        .btn:hover span:last-child { opacity: 1; transform: translateX(5px); }

    </style>
</head>
<body>

    <div class="card">
        <div class="profile-ring">
            <div class="avatar">👨‍💻</div>
        </div>
        <h1>Akhror Web</h1>
        <p class="tagline">Crafting Digital Experiences</p>

        <div class="links">
            <a href="html-dars.html" class="btn">
                <span>HTML5 Mastery</span>
                <span>→</span>
            </a>
            <a href="css_dars.html" class="btn">
                <span>CSS3 Magic</span>
                <span>→</span>
            </a>
            <a href="pythondars.html" class="btn">
                <span>Python Logic</span>
                <span>→</span>
            </a>
        </div>
    </div>

</body>
</html>

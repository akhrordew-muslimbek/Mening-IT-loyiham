<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akhror Web | Akademiya</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --accent: #00ff88; --bg: #06090f; --card: #111725; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Outfit', sans-serif; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }

        .container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 30px; text-align: center; width: 95%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .profile-img { width: 110px; height: 110px; background: linear-gradient(45deg, var(--primary), var(--accent)); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; border: 3px solid var(--bg); box-shadow: 0 0 25px var(--accent); }

        h1 { font-size: 30px; margin-bottom: 5px; font-weight: 800; }
        .title-text { color: var(--primary); font-size: 13px; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; font-weight: 600; }

        .btn-list { display: flex; flex-direction: column; gap: 12px; }
        .btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 16px; border-radius: 15px; color: white; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; text-decoration: none; }
        .btn:hover { background: rgba(0, 210, 255, 0.12); border-color: var(--primary); transform: translateY(-4px); }
        
        .status-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent); }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-content { background: var(--card); border: 1px solid var(--primary); padding: 30px; border-radius: 25px; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; text-align: left; }
        .close-btn { float: right; color: white; font-size: 22px; cursor: pointer; background: var(--primary); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        
        .quiz-box { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; border-left: 4px solid var(--accent); }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--primary); background: #000; color: white; }
        .check-btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; }

        /* Sertifikat qismi */
        #certArea { display: none; text-align: center; background: white; color: #111; padding: 40px; border: 10px double var(--primary); border-radius: 10px; margin-top: 20px; }
        .cert-title { font-size: 24px; color: #111; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img">👨‍💻</div>
        <h1>Akhror Web</h1>
        <p class="title-text">Frontend Developer</p>
        
        <div class="btn-list">
            <button class="btn" onclick="openModal('html')">HTML5 Darslari <span class="status-dot"></span></button>
            <button class="btn" onclick="openModal('css')">CSS3 Dizaynlar <span class="status-dot"></span></button>
            <button class="btn" onclick="openModal('python')">Python Mantiqi <span class="status-dot"></span></button>
            <a href="https://akhrorsoliev.github.io/" class="btn" style="border-color: #ff9f43;">Eski Portfoliom <span class="status-dot" style="background: #ff9f43;"></span></a>
        </div>
    </div>

    <div id="lessonModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
            <div id="quizContainer" class="quiz-box"></div>
            
            <div id="certArea">
                <h3 class="cert-title">SERTIFIKAT</h3>
                <p>Ushbu sertifikat egasi:</p>
                <h2 id="studentName" style="color: var(--primary); margin: 15px 0;">Ism Sharif</h2>
                <p>IT darslarini muvaffaqiyatli yakunladi!</p>
                <p style="margin-top: 20px; font-size: 12px;">Akhror Web Akademiyasi</p>
            </div>
        </div>
    </div>

    <script>
        let solvedTests = { html: false, css: false, python: false };

        const lessons = {
            html: { title: "HTML5 Darsi", content: "HTML sayt mazmunini belgilaydi.", question: "Eng katta sarlavha tegi?", answer: "h1" },
            css: { title: "CSS3 Darsi", content: "CSS rang va ko'rinish beradi.", question: "Matn rangini o'zgartirish kodi?", answer: "color" },
            python: { title: "Python Darsi", content: "Python dasturlash mantiqi.", question: "Ekranga chiqarish buyrug'i?", answer: "print" }
        };

        function openModal(type) {
            const data = lessons[type];
            document.getElementById('certArea').style.display = 'none';
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('modalBody').innerHTML = `<h2>${data.title}</h2><p>${data.content}</p>`;
            document.getElementById('quizContainer').innerHTML = `
                <p><strong>Savol:</strong> ${data.question}</p>
                <input type="text" id="quizInput" placeholder="Javobni yozing...">
                <button class="check-btn" onclick="checkAnswer('${type}')">Tekshirish</button>
            `;
            document.getElementById('lessonModal').style.display = 'flex';
        }

        function checkAnswer(type) {
            const input = document.getElementById('quizInput').value.toLowerCase().trim();
            if(input === lessons[type].answer) {
                solvedTests[type] = true;
                alert("To'g'ri! 🎉");
                checkCertificate();
            } else {
                alert("Xato! Yana bir bor urinib ko'ring. 😊");
            }
        }

        function checkCertificate() {
            if(solvedTests.html && solvedTests.css && solvedTests.python) {
                let name = prompt("Tabriklaymiz! Barcha testlarni yakunladingiz. Sertifikat uchun ismingizni kiriting:");
                if(name) {
                    document.getElementById('quizContainer').style.display = 'none';
                    document.getElementById('certArea').style.display = 'block';
                    document.getElementById('studentName').innerText = name;
                }
            }
        }

        function closeModal() { document.getElementById('lessonModal').style.display = 'none'; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akhror Web | O'quv Platformasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --accent: #00ff88; --bg: #06090f; --card: #111725; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Outfit', sans-serif; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }

        .container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 30px; text-align: center; width: 95%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .profile-img { width: 110px; height: 110px; background: linear-gradient(45deg, var(--primary), var(--accent)); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; border: 3px solid var(--bg); box-shadow: 0 0 25px var(--accent); }

        h1 { font-size: 30px; margin-bottom: 5px; font-weight: 800; }
        .title-text { color: var(--primary); font-size: 13px; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; font-weight: 600; }

        .btn-list { display: flex; flex-direction: column; gap: 12px; }
        .btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 16px; border-radius: 15px; color: white; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; text-decoration: none; }
        .btn:hover { background: rgba(0, 210, 255, 0.12); border-color: var(--primary); transform: translateY(-4px); }
        
        .status-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent); }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-content { background: var(--card); border: 1px solid var(--primary); padding: 30px; border-radius: 25px; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; }
        .close-btn { float: right; color: white; font-size: 22px; cursor: pointer; background: var(--primary); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .code-box { background: #000; color: #00ff88; padding: 15px; border-radius: 10px; font-family: monospace; margin: 10px 0; font-size: 13px; border-left: 3px solid var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img">👨‍💻</div>
        <h1>Akhror Web</h1>
        <p class="title-text">Frontend Developer</p>
        
        <div class="btn-list">
            <div class="btn" onclick="openModal('html')">HTML5 Darslari <div class="status-dot"></div></div>
            <div class="btn" onclick="openModal('css')">CSS3 Dizaynlar <div class="status-dot"></div></div>
            <div class="btn" onclick="openModal('python')">Python Mantiqi <div class="status-dot"></div></div>
            <a href="https://akhrorsoliev.github.io/" class="btn" style="border-color: #ff9f43;">Eski Portfoliom <div class="status-dot" style="background: #ff9f43; box-shadow: 0 0 12px #ff9f43;"></div></a>
        </div>
    </div>

    <div id="lessonModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const lessons = {
            html: `<h2>HTML Asoslari</h2><p>Veb-sahifa yaratish uchun asosiy teglar va ularning vazifasi.</p><div class="code-box">&lt;h1&gt;Salom Dunyo&lt;/h1&gt;</div>`,
            css: `<h2>CSS Dizayn</h2><p>Saytni chiroyli qilish uchun ranglar va joylashuv (Flexbox) darslari.</p><div class="code-box">color: cyan; display: flex;</div>`,
            python: `<h2>Python Mantiqi</h2><p>Dasturlash asoslari va algoritmlar.</p><div class="code-box">print("Hello Python")</div>`
        };

        function openModal(type) {
            document.getElementById('modalBody').innerHTML = lessons[type];
            document.getElementById('lessonModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('lessonModal').style.display = 'none';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akhror Web | O'quv va Test Platformasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --accent: #00ff88; --bg: #06090f; --card: #111725; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Outfit', sans-serif; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }

        .container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 30px; text-align: center; width: 95%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .profile-img { width: 110px; height: 110px; background: linear-gradient(45deg, var(--primary), var(--accent)); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; border: 3px solid var(--bg); box-shadow: 0 0 25px var(--accent); }

        h1 { font-size: 30px; margin-bottom: 5px; font-weight: 800; }
        .title { color: var(--primary); font-size: 13px; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; font-weight: 600; }

        .btn-list { display: flex; flex-direction: column; gap: 12px; }
        .btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 16px; border-radius: 15px; color: white; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; text-decoration: none; }
        .btn:hover { background: rgba(0, 210, 255, 0.12); border-color: var(--primary); transform: translateY(-4px); }
        
        .status-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent); }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-content { background: var(--card); border: 1px solid var(--primary); padding: 30px; border-radius: 25px; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; }
        .close-btn { float: right; color: white; font-size: 22px; cursor: pointer; background: var(--primary); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        /* Test qismi */
        .quiz-section { margin-top: 20px; padding-top: 20px; border-top: 1px dashed rgba(255,255,255,0.2); }
        .quiz-btn { background: var(--accent); color: #000; padding: 10px 20px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .quiz-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img">👨‍💻</div>
        <h1>Akhror Web</h1>
        <p class="title">Frontend Developer</p>
        
        <div class="btn-list">
            <div class="btn" onclick="openModal('html')">HTML5 Darslari <div class="status-dot"></div></div>
            <div class="btn" onclick="openModal('css')">CSS3 Dizaynlar <div class="status-dot"></div></div>
            <div class="btn" onclick="openModal('python')">Python Mantiqi <div class="status-dot"></div></div>
            <a href="https://akhrorsoliev.github.io/" target="_blank" class="btn" style="border-color: #ff9f43;">Eski Portfoliom <div class="status-dot" style="background: #ff9f43;"></div></a>
        </div>
    </div>

    <div id="lessonModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
            <div id="quizSection" class="quiz-section"></div>
        </div>
    </div>

    <script>
        const lessons = {
            html: {
                text: `<h2>HTML5 Darsi</h2><p>HTML - bu veb-sahifa mazmuni. Masalan, sarlavha uchun &lt;h1&gt; ishlatiladi.</p>`,
                question: "HTML-da eng katta sarlavha qaysi?",
                answer: "h1"
            },
            css: {
                text: `<h2>CSS3 Darsi</h2><p>CSS - bu rang va ko'rinish. 'color: red;' matnni qizil qiladi.</p>`,
                question: "CSS-da matn rangini o'zgartirish uchun qaysi xususiyat ishlatiladi?",
                answer: "color"
            },
            python: {
                text: `<h2>Python Darsi</h2><p>Python - bu mantiq. 'print()' ekranga ma'lumot chiqaradi.</p>`,
                question: "Python-da ekranga ma'lumot chiqarish buyrug'i nima?",
                answer: "print"
            }
        };

        function openModal(type) {
            const lesson = lessons[type];
            document.getElementById('modalBody').innerHTML = lesson.text;
            document.getElementById('quizSection').innerHTML = `
                <h3>O'zingizni sinab ko'ring:</h3>
                <p>${lesson.question}</p>
                <input type="text" id="userAnswer" placeholder="Javobni yozing..." style="padding: 10px; border-radius: 5px; width: 100%; margin-top: 10px; background: #000; color: white; border: 1px solid var(--primary);">
                <button class="quiz-btn" onclick="checkAnswer('${type}')">Tekshirish</button>
            `;
            document.getElementById('lessonModal').style.display = 'flex';
        }

        function checkAnswer(type) {
            const userVal = document.getElementById('userAnswer').value.toLowerCase().trim();
            if(userVal === lessons[type].answer) {
                alert("To'g'ri! Barakalla! 🎉");
            } else {
                alert("Xato. Yana bir bor urinib ko'ring! 😊");
            }
        }

        function closeModal() { document.getElementById('lessonModal').style.display = 'none'; }
    </script>
</body>
</html>
